# Force nixpacks to use Node 20 (the default 18 is EOL and was removed from nixpkgs)
# Also pin bun as the package manager

[phases.setup]
nixPkgs = ["nodejs_20", "bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = ["bun run build"]

[start]
# Astro static output → serve dist/ with serve
cmd = "bunx serve dist -l tcp://0.0.0.0:${PORT:-3000}"
