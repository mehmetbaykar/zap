# git-cliff configuration — used to automatically generate "changes since the last tag" when publishing a Zap Release.
#
# Design principles:
# - Main grouping is by conventional commit type (feat/fix/refactor/docs/test/build/ci/ui/perf/chore).
# - Scopes are kept as a bold prefix in the form `**(scope)**`, making it easy to scan by subsystem (ai/ssh/i18n/linux/...).
# - Noise such as merge commits, pure chore(release), and reverts is skipped outright.
# - Non-conventional commits fall through to the "Other" group as a fallback, losing no information without polluting the main groups.
# - Outputs a plain fragment (without the H1 title and date block); the workflow concatenates it after the intro at the top of release_body.

[changelog]
# Does not output a `# Changelog` title at the top; the publish_release step handles the overall layout.
header = ""

body = """
{%- if previous %}
{%- if previous.version %}
**Changes**: [`{{ previous.version }}` … `{{ version }}`]({{ self::compare_url(prev=previous.version, curr=version) }})

{% endif -%}
{%- endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}**({{ commit.scope }})** {% endif %}{{ commit.message | split(pat="\n") | first | trim }}{% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ self::commit_url(sha=commit.id) }})){% endif %}
{% endfor %}
{% endfor %}
{%- macro compare_url(prev, curr) -%}
https://github.com/mehmetbaykar/zap/compare/{{ prev }}...{{ curr }}
{%- endmacro -%}
{%- macro commit_url(sha) -%}
https://github.com/mehmetbaykar/zap/commit/{{ sha }}
{%- endmacro -%}
"""

# The compare footer between tags is emitted by compare_url in the template, so no extra footer is appended here.
footer = ""

trim = true

[git]
# Do not error when parsing conventional commits fails; such commits fall through to the commit_parsers fallback group.
conventional_commits = true
filter_unconventional = false
# Do not split multi-line bodies — one commit, one record.
split_commits = false

# Tag naming: a `v` prefix plus any suffix (v2026.05.27.2 / v2026.05.06.preview / v2026.05.21.zaptest01).
tag_pattern = "v[0-9].*"

# Order follows the order commits appear in the git log (newest → oldest), to keep it readable.
topo_order = false
sort_commits = "newest"

# Ignore commits that are meaningless to users, such as merges and internal release tags.
commit_preprocessors = [
    # Strip the trailing PR-number parenthesis from the first line, to avoid `(#171)` duplicating the hash link below.
    # Use `(?m)` so `$` anchors to the end of each line (the commit subject is the first line), rather than the end of the whole message.
    { pattern = '(?m) \(#[0-9]+\)$', replace = "" },
    # Strip the gitmoji prefix at the start of the commit subject (e.g. "♻️ refactor: ..."),
    # otherwise later grouping rules like `^refactor` will not match and the commit falls into "Other".
    { pattern = '^(♻️|✨|🐛|🎨|🚀|🔥|💄|📝|🛠|⚡|🚧|🐳|🔧|🚨|✅|♿|🔒)[️]?\s*', replace = "" },
]

# Order-sensitive: the first match wins. Put the noise skips first.
commit_parsers = [
    # Noise: skip
    { message = "^[Mm]erge ", skip = true },
    { message = "^[Rr]evert ", skip = true },
    { message = "^[Bb]ump ", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore: release", skip = true },
    { message = "^v[0-9]+\\.", skip = true },

    # Conventional commit main groups (the order here is the render order)
    { message = "^feat", group = "✨ New Features" },
    { message = "^fix", group = "🐛 Fixes" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refactor" },
    { message = "^ui", group = "🎨 UI" },
    { message = "^style", group = "🎨 UI" },
    { message = "^test", group = "🧪 Tests" },
    { message = "^docs", group = "📝 Documentation" },
    { message = "^(build|ci|chore)", group = "🛠 Build & Chores" },

    # Fallback: keep commits of any other shape too, placing them in the "Other" group to avoid dropping non-conventional commits.
    { message = ".*", group = "📦 Other" },
]
